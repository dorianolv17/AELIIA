                        <section className="mb-40">
                            <h2 className="text-3xl font-black mb-12 uppercase italic tracking-tighter">L'Effet AELIIA</h2>
                            <div className="flex justify-center gap-3 mb-10 flex-wrap">
                                {Object.keys(SCENARIOS).map(k => (
                                    <button key={k} onClick={() => setActiveScenario(k)} className={`px-8 py-3 rounded-full text-[10px] font-black border uppercase transition-all ${activeScenario === k ? 'bg-violet-600 border-violet-500 shadow-lg' : 'bg-white/5 border-white/10 text-gray-500'}`}>{SCENARIOS[k].title}</button>
                                ))}
                            </div>
                            <div className="max-w-5xl mx-auto space-y-4">
                                <div className="glass p-6 rounded-[2rem] text-left border-violet-500/20 shadow-xl shadow-violet-900/5">
                                    <div className="text-[10px] font-black text-violet-400 uppercase mb-2 tracking-widest flex items-center gap-2"><LucideIcon name="MessageCircle" size={14}/> Message Reçu (Base)</div>
                                    <p className="text-lg italic text-white/80 leading-relaxed font-serif">"{SCENARIOS[activeScenario].received}"</p>
                                </div>
                                <div className="flex flex-col md:flex-row gap-4">
                                    <div className="flex-1 glass p-8 rounded-[2.5rem] border-white/10 text-left bg-white/2">
                                        <div className="text-[10px] font-black text-white/30 uppercase mb-4 tracking-widest flex items-center gap-2"><LucideIcon name="XCircle" size={14}/> IA Standard</div>
                                        <p className="text-sm text-white/50 italic leading-relaxed">"{SCENARIOS[activeScenario].before}"</p>
                                        <div className="mt-6 text-[9px] font-black text-rose-500 uppercase">Issue probable : {SCENARIOS[activeScenario].impactBefore}</div>
                                    </div>
                                    <div className="flex-1 p-8 rounded-[2.5rem] border border-violet-500/30 text-left relative overflow-hidden bg-violet-600/5 shadow-2xl">
                                        <div className="absolute top-0 right-0 w-24 h-24 bg-violet-500/10 blur-3xl"></div>
                                        <div className="text-[10px] font-black text-violet-400 uppercase mb-4 tracking-widest flex items-center gap-2"><LucideIcon name="CheckCircle" size={14}/> AELIIA Neural</div>
                                        <p className="text-sm text-white leading-relaxed font-medium italic">"{SCENARIOS[activeScenario].after}"</p>
                                        <div className="mt-6 p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-xl">
                                            <div className="text-[9px] font-black text-emerald-400 uppercase mb-1">Réponse de l'autre :</div>
                                            <p className="text-xs text-emerald-100 italic">{SCENARIOS[activeScenario].impactAfter}</p>
                                        </div>
                                        <div className="mt-3 text-[10px] font-black text-white uppercase tracking-tighter opacity-40">Bilan : {SCENARIOS[activeScenario].finalResult}</div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Coachs */}
                        <section id="coaches" className="mb-40">
                            <h2 className="text-4xl font-black mb-4 uppercase italic tracking-tighter">Nos Experts Disponibles</h2>
                            <p className="text-slate-500 mb-20 text-lg">Choisissez votre allié stratégique selon votre besoin du moment.</p>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                                {COACH_PROFILES.map(c => (
                                    <div key={c.id} onClick={() => setIsAuthOpen(true)} className="glass p-6 rounded-[3rem] cursor-pointer group hover:border-violet-500/50 transition-all flex flex-col shadow-xl">
                                        <div className="relative overflow-hidden rounded-[2.5rem] mb-6 aspect-[3/4]">
                                            <img src={c.image} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000 grayscale-[20%] group-hover:grayscale-0"/>
                                            <div className="absolute top-4 right-4 bg-red-600 px-4 py-1.5 rounded-full text-[10px] font-black animate-pulse shadow-lg flex items-center gap-1"><span className="w-1 h-1 bg-white rounded-full"></span>LIVE</div>
                                        </div>
                                        <h3 className="font-bold text-xl mb-1 text-left">{c.name}</h3>
                                        <p className={`text-[9px] uppercase font-black tracking-widest mb-4 italic text-left ${c.color}`}>{c.specialty}</p>
                                        <div className="mb-6 text-left border-t border-white/5 pt-4">
                                            <p className="text-[8px] font-black text-violet-400 uppercase tracking-widest mb-2">Ce que je t'apporte :</p>
                                            <p className="text-[11px] text-slate-400 leading-snug">{c.benefits}</p>
                                        </div>
                                        <div className="mt-auto flex items-center justify-between text-[10px] font-black text-violet-400">
                                            <span className="bg-violet-500/5 px-3 py-1 rounded-lg uppercase tracking-tight">{c.consultations.toLocaleString()} SÉANCES RÉALISÉES</span>
                                            <LucideIcon name="ChevronRight" size={16} />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* L'Alternative Augmentée - PLUS COMPLET & APRÈS COACHS */}
                        <section className="mb-40 py-24 bg-violet-600/5 rounded-[4rem] border border-white/5 relative overflow-hidden">
                            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-px bg-gradient-to-r from-transparent via-violet-500/50 to-transparent"></div>
                            <div className="max-w-5xl mx-auto px-10 grid md:grid-cols-2 gap-20 items-center">
                                <div className="text-left space-y-8">
                                    <h2 className="text-4xl md:text-5xl font-black italic uppercase tracking-tighter leading-tight">L'Alternative <br/> Augmentée.</h2>
                                    <div className="w-20 h-1.5 bg-violet-600 rounded-full"></div>
                                    <p className="text-slate-400 text-lg font-medium leading-relaxed">
                                        Pourquoi AELIIA surpasse le coaching classique ? Nous avons fusionné l'IA neuronale avec l'élite du savoir-faire humain. 
                                        Là où un coach humain est limité par son agenda, son prix et ses biais personnels, AELIIA offre une perfection constante.
                                    </p>
                                    <div className="space-y-4">
                                        <div className="flex gap-4 items-start"><LucideIcon name="Zap" size={20} className="text-violet-400 shrink-0"/><p className="text-sm text-slate-300 font-bold">Immédiateté : Zéro délai de rendez-vous. Réponse en 3 secondes.</p></div>
                                        <div className="flex gap-4 items-start"><LucideIcon name="Target" size={20} className="text-violet-400 shrink-0"/><p className="text-sm text-slate-300 font-bold">Zéro Jugement : Exprimez vos doutes les plus intimes sans crainte.</p></div>
                                        <div className="flex gap-4 items-start"><LucideIcon name="Shield" size={20} className="text-violet-400 shrink-0"/><p className="text-sm text-slate-300 font-bold">Sécurité Militaire : Vos secrets restent les vôtres, protégés par cryptage.</p></div>
                                    </div>
                                </div>
                                <div className="glass p-10 rounded-[3rem] border-violet-500/20 shadow-2xl relative">
                                    <h3 className="text-2xl font-black italic mb-10 text-center uppercase">Le Match</h3>
                                    <div className="space-y-6">
                                        <div className="flex justify-between items-center border-b border-white/5 pb-4"><span className="text-xs text-slate-500 font-bold uppercase">Prix Moyen Séance</span><div className="flex items-center gap-4"><span className="text-[10px] line-through opacity-40">120€</span><span className="text-emerald-400 font-black">4.99€</span></div></div>
                                        <div className="flex justify-between items-center border-b border-white/5 pb-4"><span className="text-xs text-slate-500 font-bold uppercase">Disponibilité</span><div className="flex items-center gap-4"><span className="text-[10px] opacity-40">Bureau</span><span className="text-violet-400 font-black uppercase">24h/24 - 7j/7</span></div></div>
                                        <div className="flex justify-between items-center border-b border-white/5 pb-4"><span className="text-xs text-slate-500 font-bold uppercase">Vitesse d'Analyse</span><div className="flex items-center gap-4"><span className="text-[10px] opacity-40">3 Jours</span><span className="text-violet-400 font-black uppercase">3 Secondes</span></div></div>
                                        <div className="flex justify-between items-center"><span className="text-xs text-slate-500 font-bold uppercase">Sincérité</span><div className="flex items-center gap-4"><span className="text-[10px] opacity-40">Sociale</span><span className="text-emerald-400 font-black uppercase">Radicale</span></div></div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Avis Clients */}
                        <section className="mb-40">
                             <div className="inline-flex items-center gap-2 mb-6"><div className="flex">{[1,2,3,4,5].map(s => <LucideIcon key={s} name="Star" size={16} color="#fbbf24" fill="#fbbf24" />)}</div><span className="text-sm font-black tracking-widest text-white/50">NOTE CLIENT : 4.9/5</span></div>
                             <div className="w-full overflow-hidden mask-gradient-x bg-white/2 py-10 border-y border-white/5">
                                <div className="flex animate-scroll gap-8 whitespace-nowrap">
                                    {[...REVIEWS_DATA, ...REVIEWS_DATA].map((r, i) => (
                                        <div key={i} className="inline-block glass p-8 rounded-[2.5rem] min-w-[320px] text-left">
                                            <div className="flex gap-1 mb-3">{Array(r.stars).fill(0).map((_, idx) => (<LucideIcon key={idx} name="Star" size={12} color="#fbbf24" fill="#fbbf24" />))}</div>
                                            <span className="italic font-medium text-slate-200 block whitespace-normal text-sm leading-relaxed">"{r.text}"</span>
                                        </div>
                                    ))}
                                </div>
                             </div>
                        </section>

                        {/* Tarifs */}
                        <section id="pricing" className="mb-40">
                            <h2 className="text-4xl font-black mb-16 uppercase italic tracking-tighter leading-none">Accès Instantané</h2>
                            <div className="grid md:grid-cols-3 gap-8">
                                <PricingCard title="Pack Découverte" price="4.99€" credits="12 Crédits (+1h)" benefits={["Accès aux 4 coachs IA", "Analyseur Neural illimité", "Support 24/7", "Crédits à vie"]} priceId={PRICE_IDS.pack10} onCheckout={startCheckout} />
                                <PricingCard title="Pack Sérénité" price="9.99€" credits="60 Crédits (+5h)" pop={true} benefits={["Neural-3 Ultra Rapide", "Sauvegarde historique", "Priorité réseau", "Utilisation sans limites"]} priceId={PRICE_IDS.pack50} onCheckout={startCheckout} />
                                <PricingCard title="Pack Expert" price="19.99€" credits="120 Crédits (+10h)" benefits={["Support VIP direct", "Accès bêta nouvelles IA", "Export PDF illimité", "Temps doublé"]} priceId={PRICE_IDS.pack100} onCheckout={startCheckout} />
                            </div>
                        </section>

                        <footer className="pt-20 border-t border-white/5 opacity-30 text-[10px] font-black uppercase tracking-[0.5em]">© 2026 AELIIA AI • Labélisé Psychologie Positive</footer>
                    </main>
                    <AuthModal isOpen={isAuthOpen} onClose={() => setIsAuthOpen(false)} firebase={firebase} />
                </div>
            );

            if (view !== 'landing') {
                return (
                    <div className="min-h-screen bg-[#020202] text-white pt-6 px-4 pb-4 fade-in font-sans relative">
                        {timeLeft <= 0 && (
                            <div className="fixed inset-0 z-[100] bg-black/90 backdrop-blur-xl flex items-center justify-center p-6 fade-in">
                                <div className="bg-[#0a0a0a] border border-violet-500/30 p-12 rounded-[3rem] max-w-md w-full text-center shadow-2xl">
                                    <div className="w-16 h-16 bg-violet-600/10 rounded-2xl flex items-center justify-center mx-auto mb-8"><LucideIcon name="ZapOff" size={32} color="#7c3aed" /></div>
                                    <h2 className="text-2xl font-black uppercase italic mb-4 text-white">Session épuisée</h2>
                                    <button onClick={() => setView('landing')} className="block w-full bg-white text-black py-4 rounded-xl font-bold text-sm shadow-xl active:scale-95 transition-all">Recharger mes accès</button>
                                    <button onClick={() => firebase.signOut(firebase.auth)} className="mt-8 text-[10px] font-black uppercase tracking-widest text-slate-600 hover:text-white transition-colors">Se déconnecter</button>
                                </div>
                            </div>
                        )}

                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 gap-4 glass p-4 rounded-[2.5rem]">
                            <div className="flex items-center gap-4 cursor-pointer group" onClick={() => setView('landing')}>
                                <div className="w-10 h-10 rounded-xl bg-violet-600 flex items-center justify-center font-black shadow-lg shadow-violet-500/30">A</div>
                                <div className="leading-tight text-left">
                                    <h1 className="font-bold text-xs uppercase tracking-widest">Dashboard</h1>
                                    <p className="text-[10px] font-black text-violet-400 flex items-center gap-1 mt-0.5 uppercase"><span className="w-1 h-1 bg-violet-500 rounded-full animate-pulse"></span>{formatDisplayTime(timeLeft)} RESTANTS</p>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => {setView('app'); setSelectedCoach(null);}} className={`px-5 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${view === 'app' ? 'bg-white text-black shadow-lg shadow-white/10' : 'text-gray-400 hover:bg-white/5'}`}>Analyseur</button>
                                <button onClick={() => setView('coach')} className={`px-5 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${view === 'coach' ? 'bg-white text-black shadow-lg shadow-white/10' : 'text-gray-400 hover:bg-white/5'}`}>Coachs IA</button>
                                <button onClick={() => firebase.signOut(firebase.auth)} className="p-2 bg-red-500/10 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition-all"><LucideIcon name="LogOut" size={16}/></button>
                            </div>
                        </div>

                        <div className="max-w-6xl mx-auto min-h-[600px]">
                            {view === 'app' && (
                                <div className="grid lg:grid-cols-2 gap-8 h-full fade-in">
                                    <div className="glass p-10 rounded-[3rem] flex flex-col relative overflow-hidden text-left shadow-2xl border-white/5">
                                        <div className="absolute top-0 left-0 w-1.5 h-full bg-violet-600"></div>
                                        <h2 className="text-[10px] font-black mb-8 opacity-40 uppercase flex items-center gap-2 tracking-widest"><LucideIcon name="Activity" size={14}/> Décryptage Neural</h2>
                                        <textarea value={flashInput} onChange={(e) => setFlashInput(e.target.value)} className="flex-1 bg-black/20 border border-white/5 rounded-[2rem] p-8 outline-none mb-8 resize-none focus:border-violet-500/40 text-lg placeholder:text-slate-800 text-white font-medium" placeholder="Collez le message reçu ici pour une analyse psychologique..." />
                                        <button onClick={handleFlashAnalyze} disabled={isProcessing || !flashInput.trim() || timeLeft <= 0} className="bg-white text-black py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl active:scale-[0.98] transition-all">{isProcessing ? "Analyse en cours..." : "Lancer l'Analyse"}</button>
                                    </div>
                                    <div className="glass rounded-[3rem] p-10 flex flex-col items-center justify-center text-center relative bg-white/2">
                                        {!analysisResult ? (
                                            <div className="opacity-20 flex flex-col items-center"><LucideIcon name="Cpu" size={64} color="#7c3aed" className="mb-6 animate-pulse" /><p className="text-[10px] uppercase font-black tracking-widest">Prêt pour l'analyse</p></div>
                                        ) : (
                                            <div className="space-y-6 w-full text-left fade-in">
                                                <div className="p-6 bg-white/5 rounded-2xl border border-white/5">
                                                    <p className="text-[9px] font-black uppercase text-violet-400 mb-2 tracking-widest">Tonalité Détectée</p>
                                                    <p className="text-xl font-bold tracking-tight">{analysisResult.tone}</p>
                                                </div>
                                                <div className="p-6 bg-white/5 rounded-2xl border border-white/5">
                                                    <p className="text-[9px] font-black uppercase text-fuchsia-400 mb-2 tracking-widest">Intention Psychologique</p>
                                                    <p className="text-xl font-bold tracking-tight">{analysisResult.intent}</p>
                                                </div>
                                                <div className="p-8 bg-emerald-500/10 border border-emerald-500/20 rounded-[2.5rem] shadow-xl relative">
                                                    <p className="text-[9px] font-black uppercase text-emerald-400 mb-4 tracking-widest">Suggestion AELIIA</p>
                                                    <p className="text-lg font-medium italic text-emerald-50 leading-relaxed">"{analysisResult.suggestion}"</p>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {view === 'coach' && !selectedCoach && (
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 fade-in">
                                    {COACH_PROFILES.map(c => (
                                        <div key={c.id} onClick={() => setSelectedCoach(c)} className="glass p-6 rounded-[3rem] cursor-pointer group hover:border-violet-500/50 transition-all flex flex-col shadow-xl">
                                            <div className="relative overflow-hidden rounded-[2.5rem] mb-6 aspect-[3/4] shadow-2xl"><img src={c.image} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000 grayscale-[20%] group-hover:grayscale-0"/></div>
                                            <h3 className="font-bold text-xl mb-1 text-left">{c.name}</h3>
                                            <p className={`text-[9px] uppercase font-black tracking-widest mb-4 italic text-left ${c.color}`}>{c.specialty}</p>
                                            <div className="mt-auto flex items-center justify-between text-[10px] font-black text-violet-400"><span className="bg-violet-500/5 px-3 py-1 rounded-lg uppercase tracking-tighter">{c.consultations.toLocaleString()} SÉANCES</span><LucideIcon name="ChevronRight" size={16} /></div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {view === 'coach' && selectedCoach && (
                                <div className="glass rounded-[3rem] h-[700px] flex flex-col overflow-hidden fade-in max-w-4xl mx-auto shadow-2xl">
                                    <div className="p-8 border-b border-white/5 flex justify-between items-center bg-white/2 backdrop-blur-xl">
                                        <div className="flex items-center gap-6">
                                            <button onClick={() => setSelectedCoach(null)} className="p-3 hover:bg-white/10 rounded-xl transition-all"><LucideIcon name="ArrowLeft" size={24}/></button>
                                            <img src={selectedCoach.image} className="w-12 h-12 rounded-2xl object-cover border border-white/20 shadow-xl" />
                                            <div className="text-left"><h3 className="font-black text-lg tracking-tight">{selectedCoach.name}</h3><p className="text-[9px] text-emerald-400 uppercase tracking-widest flex items-center gap-1.5 font-bold"><span className="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>Disponible</p></div>
                                        </div>
                                        <div className="text-right"><p className="text-[9px] text-slate-500 uppercase font-black mb-1">Session active</p><p className="text-xl font-black text-violet-400 italic tracking-tighter">{formatDisplayTime(timeLeft)}</p></div>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-10 space-y-8 scrollbar-hide bg-black/20 text-left">
                                        {chatHistory.map((m, i) => (
                                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}><div className={`max-w-[85%] p-5 rounded-[2rem] text-sm leading-relaxed ${m.role === 'user' ? 'bg-violet-600 text-white rounded-br-none shadow-lg' : 'bg-white/10 text-gray-200 border border-white/5 rounded-bl-none'}`}><p className="whitespace-pre-line leading-relaxed font-medium">{m.text}</p></div></div>
                                        ))}
                                        {isProcessing && (<div className="flex justify-start"><div className="bg-white/5 p-4 rounded-full flex gap-1"><div className="typing-dot"></div><div className="typing-dot"></div><div className="typing-dot"></div></div></div>)}
                                        <div ref={chatEndRef}></div>
                                    </div>
                                    <div className="p-8 border-t border-white/5 bg-[#050505] flex gap-4">
                                        <input value={inputMessage} onChange={e => setInputMessage(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSendMessage()} className="flex-1 bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-violet-500/30 text-sm font-medium shadow-inner text-white" placeholder={`Posez votre question à ${selectedCoach.name}...`} />
                                        <button onClick={handleSendMessage} disabled={!inputMessage.trim() || isProcessing || timeLeft <= 0} className="p-4 bg-white text-black rounded-2xl hover:bg-violet-50 transition-all active:scale-90 disabled:opacity-20 shadow-xl"><LucideIcon name="Send" size={24}/></button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            return <LandingPage />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
